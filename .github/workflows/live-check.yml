name: Live smoke check

on:
  schedule:
    - cron: "0 8 * * 1" # every Monday at 08:00 UTC
  workflow_dispatch: # allow manual runs from the Actions tab too

jobs:
  live-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run live smoke check against the real sites
        run: python3 scripts/live_smoke_check.py
